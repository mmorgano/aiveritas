[tool.pylint.main]
py-version = "3.12"
ignore = [".venv", ".pytest_cache", "__pycache__"]

[tool.pylint.messages_control]
disable = [
  "too-few-public-methods",
]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.design]
max-args = 12
max-locals = 20
max-returns = 10

[tool.pylint.basic]
good-names = ["df", "id", "pk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
